services:
  postgres:
    image: postgres:16-alpine
    container_name: cbpq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: craig_bryson_pub_quiz
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - cbpq_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d craig_bryson_pub_quiz"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  cbpq_postgres_data:
